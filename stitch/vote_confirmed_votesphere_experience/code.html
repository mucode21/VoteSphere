<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VoteSphere - Confirm Your Vote</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "container-max": "1200px",
                        "margin-mobile": "20px",

                    "fontFamily": {

<style>
        .ledger-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .ambient-shadow { box-shadow: 0 30px 60px -15px rgba(115, 92, 0, 0.05); }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex items-center justify-center p-4">
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-inverse-surface/80 backdrop-blur-sm z-40 transition-opacity"></div>
<!-- Modal Container -->
<div class="relative z-50 w-full max-w-[600px] bg-surface-container-lowest ledger-border ambient-shadow mx-auto overflow-hidden animate-fade-in-up">
<!-- Header Section -->
<div class="p-8 pb-6 border-b border-outline-variant/30 flex items-center justify-between">
<div>
<span class="material-symbols-outlined text-primary text-3xl mb-2" style="font-variation-settings: 'FILL' 1;">how_to_reg</span>
<h2 class="font-headline-md text-headline-md text-primary">Confirm Your Vote</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Please review your selection carefully.</p>
</div>
<!-- Optional close icon or seal could go here -->
</div>
<!-- Content Section -->
<div class="p-8 space-y-6">
<!-- Details List -->
<div class="space-y-4">
<div class="flex justify-between items-center py-3 border-b border-outline-variant/30 hover:bg-secondary/5 transition-colors">
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Election</span>
<span class="font-body-md text-body-md text-on-surface font-medium">Global Medical Board 2024</span>
</div>
<div class="flex justify-between items-center py-3 border-b border-outline-variant/30 hover:bg-secondary/5 transition-colors">
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Selection</span>
<span class="font-body-lg text-body-lg text-primary font-medium">Dr. Elena Rostova</span>
</div>
<div class="flex justify-between items-center py-3 border-b border-outline-variant/30 hover:bg-secondary/5 transition-colors">
<span class="font-label-md text-label-md text-on-surface-variant uppercase">Wallet</span>
<span class="font-label-sm text-label-sm text-on-surface-variant bg-surface-container-low px-3 py-1 rounded-full">0x7F...92B4</span>
</div>
</div>
<!-- Warning Callout -->
<div class="bg-error-container/20 border border-error/20 p-4 flex items-start space-x-3 mt-6">
<span class="material-symbols-outlined text-error mt-0.5">warning</span>
<div>
<h4 class="font-label-md text-label-md text-error uppercase mb-1">Immutable Action</h4>
<p class="font-body-md text-body-md text-on-surface-variant text-sm">Once confirmed, this vote is permanently recorded on the Stellar ledger and cannot be changed, reversed, or disputed.</p>
</div>
</div>
</div>
<!-- Footer / Actions -->
<div class="p-8 pt-6 bg-surface-container-low flex flex-col sm:flex-row-reverse gap-4 justify-between items-center border-t border-outline-variant/30">
<button class="w-full sm:w-auto bg-[#B8860B] hover:bg-primary-container text-on-primary font-label-md text-label-md uppercase px-8 py-4 transition-colors flex items-center justify-center space-x-2">
<span>Confirm Vote on Stellar</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
<button class="w-full sm:w-auto border border-[#B8860B] text-primary hover:bg-primary/5 font-label-md text-label-md uppercase px-8 py-4 transition-colors">
                Cancel
            </button>
</div>
</div>
</body></html>
