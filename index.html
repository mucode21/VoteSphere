<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoteSphere</title>

  <!-- Theme loader to prevent flashing -->
  <script>
    (function () {
      const theme = localStorage.getItem('votesphere_theme') || 'light';
      const root = document.documentElement;
      if (theme === 'dark') {
        root.classList.add('dark');
        root.classList.remove('light');
      } else {
        root.classList.add('light');
        root.classList.remove('dark');
      }
    })();
  </script>

  <!-- Tailwind CSS CDN with forms and container queries plugins -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&amp;family=Montserrat+Alternates:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />

  <!-- Tailwind Config matching the Stitch-generated styles -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-container": "#fffbff",
            "secondary": "#735c00",
            "primary-fixed-dim": "#f7bd48",
            "on-primary": "#ffffff",
            "on-tertiary-container": "#fffbff",
            "outline-variant": "#d3c4af",
            "surface-container-low": "#f5f3ee",
            "primary-fixed": "#ffdea6",
            "surface": "#fbf9f4",
            "tertiary-fixed": "#f0e1c1",
            "on-tertiary": "#ffffff",
            "error": "#ba1a1a",
            "on-primary-fixed": "#271900",
            "outline": "#817563",
            "inverse-surface": "#30312e",
            "on-surface": "#1b1c19",
            "on-secondary-container": "#745c00",
            "on-surface-variant": "#4f4535",
            "tertiary": "#655b42",
            "on-tertiary-fixed": "#221b07",
            "primary-container": "#986d00",
            "on-background": "#1b1c19",
            "surface-container-lowest": "#ffffff",
            "surface-dim": "#dbdad5",
            "secondary-container": "#fed65b",
            "surface-container-highest": "#e4e2dd",
            "surface-variant": "#e4e2dd",
            "tertiary-container": "#7f7459",
            "surface-tint": "#7b5800",
            "on-secondary-fixed-variant": "#574500",
            "surface-bright": "#fbf9f4",
            "on-primary-fixed-variant": "#5d4200",
            "on-secondary-fixed": "#241a00",
            "tertiary-fixed-dim": "#d3c5a7",
            "inverse-on-surface": "#f2f1ec",
            "on-error-container": "#93000a",
            "on-secondary": "#ffffff",
            "on-tertiary-fixed-variant": "#4f462f",
            "error-container": "#ffdad6",
            "primary": "#785600",
            "on-error": "#ffffff",
            "secondary-fixed-dim": "#e9c349",
            "inverse-primary": "#f7bd48",
            "surface-container-high": "#eae8e3",
            "background": "#fbf9f4",
            "surface-container": "#f0eee9",
            "secondary-fixed": "#ffe088"
          },
          borderRadius: {
            DEFAULT: "0.125rem",
            lg: "0.25rem",
            xl: "0.5rem",
            full: "0.75rem"
          },
          spacing: {
            "container-max": "1200px",
            "margin-mobile": "20px",
            unit: "8px",
            "margin-desktop": "64px",
            gutter: "24px"
          },
          fontFamily: {
            "headline-md": ["Dancing Script"],
            "display-lg": ["Dancing Script"],
            "label-md": ["Montserrat Alternates"],
            "display-lg-mobile": ["Dancing Script"],
            "label-sm": ["Montserrat Alternates"],
            "body-lg": ["Montserrat Alternates"],
            "headline-sm": ["Dancing Script"],
            "body-md": ["Montserrat Alternates"]
          },
          fontSize: {
            "headline-md": ["32px", { lineHeight: "1.3", fontWeight: "600" }],
            "display-lg": ["48px", { lineHeight: "1.2", letterSpacing: "-0.01em", fontWeight: "700" }],
            "label-md": ["14px", { lineHeight: "1.2", letterSpacing: "0.05em", fontWeight: "600" }],
            "display-lg-mobile": ["36px", { lineHeight: "1.2", fontWeight: "700" }],
            "label-sm": ["12px", { lineHeight: "1.2", letterSpacing: "0.03em", fontWeight: "500" }],
            "body-lg": ["18px", { lineHeight: "1.6", letterSpacing: "0.01em", fontWeight: "400" }],
            "headline-sm": ["24px", { lineHeight: "1.4", fontWeight: "600" }],
            "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }]
          }
        }
      }
    };
  </script>
  <style>
    .executive-border {
      border: 1px solid rgba(212, 175, 55, 0.3);
    }

    .executive-shadow {
      box-shadow: 0 30px 60px -10px rgba(184, 134, 11, 0.05);
    }

    .vellum-card {
      background-color: #ffffff;
      border: 1px solid rgba(212, 175, 55, 0.3);
      box-shadow: 0 4px 30px rgba(184, 134, 11, 0.05);
    }

    .input-ledger {
      border: none;
      border-bottom: 1px solid #817563;
      background-color: transparent;
      border-radius: 0;
      padding-left: 0;
      padding-right: 0;
    }

    .input-ledger:focus {
      outline: none;
      box-shadow: none;
      border-bottom: 2px solid #785600;
    }

    .btn-primary {
      background-color: #B8860B;
      color: white;
      text-transform: uppercase;
    }

    .btn-ghost {
      border: 1px solid #B8860B;
      color: #B8860B;
      text-transform: uppercase;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .nav-active {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>

<body class="bg-background text-on-surface antialiased flex flex-col min-h-screen">
  <!-- Uncaught Error Reporter for debugging -->
  <div id="error-reporter" style="display:none; padding: 20px; background: #ffdad6; color: #93000a; font-family: monospace; border: 2px solid #ba1a1a; z-index: 999999; position: relative;">
    <h3>Uncaught Runtime Error:</h3>
    <pre id="error-message"></pre>
  </div>
  <script>
    window.addEventListener('error', function(event) {
      document.getElementById('error-reporter').style.display = 'block';
      document.getElementById('error-message').textContent += event.message + '\n' + (event.error ? event.error.stack : '') + '\n';
    });
    window.addEventListener('unhandledrejection', function(event) {
      document.getElementById('error-reporter').style.display = 'block';
      document.getElementById('error-message').textContent += 'Unhandled Promise Rejection: ' + event.reason + '\n';
    });
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
